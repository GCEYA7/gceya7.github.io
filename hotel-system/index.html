<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<div class="system-container">
    <header class="system-header">
        <div class="brand-wrapper">
        <img src="gceya7.svg" alt="Hotel Logo" class="logo">
        <h1>Hotel Management</h1>
        </div>
        <p>Front Desk Booking System</p>
    </header>

    <div class="dashboard-grid">

        <div class="panel input-panel">
            <h2>Guest Details</h2>

            <div class="form-group">
                <label>Guest Name</label>
                <input type="text" id="guestName" placeholder="Enter guest name...">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="isReturning">
                <label for="isReturning">Returning Customer (Eligible for 3% Loyalty Bonus)</label>
            </div>

            <h2>Room Selection</h2>
            <p class="helper-text">Inventory limit: 30 rooms total</p>

            <div class="form-group">
                <label>Room Tier</label>
                <select id="roomType">
                    <option value="standard">Standard (R 400/night)</option>
                    <option value="standard-vip">Standard VIP (R 600/night)</option>
                    <option value="high-vip">High VIP (R 1,000/night)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Number of Nights / Rooms</label>
                <input type="number" id="roomQuantity" min="1" max="30" value="1">
            </div>

            <button id="calculateBtn" class="btn-primary">Calculate Bill</button>
        </div>

        <div class="panel receipt-panel">
            <h2>Booking Summary</h2>

            <div class="receipt-item">
                <span>Guest:</span>
                <span id="displayGuest">--</span>
            </div>

            <div class="receipt-item">
                <span>Base Cost:</span>
                <span id="displayBase">R 0.00</span>
            </div>

            <div class="receipt-item highlight-discount">
                <span>Tier Discount:</span>
                <span id="displayTierDiscount">0%</span>
            </div>

            <div class="receipt-item highlight-discount">
                <span>Loyalty Bonus:</span>
                <span id="displayLoyalty">No</span>
            </div>

            <hr class="receipt-divider">

            <div class="receipt-total">
                <span>Final Total:</span>
                <span id="displayTotal">R 0.00</span>
            </div>

            <button class="btn-secondary" disabled>Confirm Booking</button>
        </div>

    </div>
</div>
<script src="script.js"></script>
</html>
